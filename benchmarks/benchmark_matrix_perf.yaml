# Task 10.1.2 — Model-centric persistent-session performance matrix

defaults:
  n_ctx: 2048
  sync_timeout_s: 1800
  sync_max_rounds: 8
  wait_cluster_timeout_s: 120
  sample_interval_ms: 200
  generate_timeout_s: 300
  mono_ngl: 99
  reset_before_run: false
  prompt_category: short
  regression_threshold_pct: 10
  persistent_session: true
  generations: 20
  warmup: true
  warmup_prompt: "Hello"
  warmup_tokens: 4
  generate_tokens: 16

profiles:
  # Fast verification — 1 model, 2 prompts, 3 generates (~5 min)
  smoke:
    mode: warm
    models:
      - tinyllama
    cluster_sizes:
      - 3
    prompt_profiles:
      - short
      - medium
    generations: 3
    persistent_session: true

  # Quick comparison — 3 models, 2 prompts, 5 generates (~20-30 min)
  quick:
    mode: warm
    models:
      - tinyllama
      - llama3_1b
      - qwen2_1_5b
    cluster_sizes:
      - 3
    prompt_profiles:
      - short
      - medium
    generations: 5
    persistent_session: true

  # Full warm — all models, all prompt profiles, 20 generates
  warm:
    mode: warm
    models:
      - tinyllama
      - llama3_1b
      - qwen2_1_5b
    cluster_sizes:
      - 3
    prompt_profiles:
      - short
      - medium
      - long
      - chat
      - code
      - reasoning
    generations: 20
    reset_before_run: false
    persistent_session: true

  # Runtime only — existing layers ready, measure generate path
  runtime-only:
    mode: runtime-only
    models:
      - tinyllama
    cluster_sizes:
      - 3
    prompt_profiles:
      - short
      - medium
    generations: 5
    persistent_session: true

  # Cold — full reset + install per model
  cold:
    mode: cold
    models:
      - tinyllama
    cluster_sizes:
      - 3
    prompt_profiles:
      - short
    generations: 5
    reset_before_run: true
    persistent_session: true

  # Legacy smoke alias
  perf_smoke:
    mode: warm
    models:
      - tinyllama
    cluster_sizes:
      - 3
    prompt_profiles:
      - short
    generations: 5
    persistent_session: true

  # Full scientific matrix (long run)
  perf:
    mode: perf
    models:
      - tinyllama
      - llama3_1b
      - qwen2_1_5b
      - qwen8b
    cluster_sizes:
      - mono
      - 1
      - 2
      - 3
      - 4
    prompt_profiles:
      - short
      - medium
    generate_tokens:
      - 16
      - 32
    generations: 20
    persistent_session: true
    modes:
      - cold
      - warm

  scaling:
    mode: scaling
    models:
      - tinyllama
    cluster_sizes:
      - mono
      - 1
      - 2
      - 3
      - 4
    prompt_profiles:
      - short
    generations: 15
    persistent_session: true
