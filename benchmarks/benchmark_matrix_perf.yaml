# Task 10.1.1 — Persistent-session performance matrix

defaults:
  n_ctx: 512
  sync_timeout_s: 1800
  sync_max_rounds: 8
  wait_cluster_timeout_s: 120
  sample_interval_ms: 100
  generate_timeout_s: 180
  mono_ngl: 99
  reset_before_run: false
  prompt_category: short
  regression_threshold_pct: 10
  # Persistent session benchmark (10.1.1)
  persistent_session: true
  generations: 20
  warmup: true
  warmup_tokens: 4
  prefill_probe: false

profiles:
  # Full scientific matrix (long run)
  perf:
    mode: perf
    models:
      - tinyllama
      - llama3_1b
      - qwen2_1_5b
      - qwen8b
    cluster_sizes:
      - mono
      - 1
      - 2
      - 3
      - 4
    prompt_profiles:
      - short
      - medium
    generate_tokens:
      - 16
      - 32
    generations: 20
    persistent_session: true
    modes:
      - cold
      - warm

  # Quick smoke for development
  perf_smoke:
    mode: perf
    models:
      - tinyllama
    cluster_sizes:
      - mono
      - 3
    prompt_profiles:
      - short
    generate_tokens:
      - 16
    generations: 5
    persistent_session: true
    modes:
      - warm

  # Cold start overhead (install + sync + runtime)
  cold:
    mode: cold
    models:
      - tinyllama
      - llama3_1b
      - qwen2_1_5b
    cluster_sizes:
      - 3
    prompt_profiles:
      - short
    generate_tokens:
      - 16
    generations: 10
    reset_before_run: true
    persistent_session: true
    modes:
      - cold

  # Warm runtime only (layer store ready)
  warm:
    mode: warm
    models:
      - tinyllama
      - llama3_1b
      - qwen2_1_5b
    cluster_sizes:
      - 3
    prompt_profiles:
      - short
    generate_tokens:
      - 16
    generations: 20
    reset_before_run: false
    warmup_tokens: 0
    prefill_probe: false
    persistent_session: true
    modes:
      - warm

  # Scaling efficiency study
  scaling:
    mode: scaling
    models:
      - tinyllama
    cluster_sizes:
      - mono
      - 1
      - 2
      - 3
      - 4
    prompt_profiles:
      - short
    generate_tokens:
      - 16
    generations: 15
    reset_before_run: false
    persistent_session: true
    modes:
      - warm
