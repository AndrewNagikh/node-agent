# Benchmark matrix — profiles select model keys, cluster sizes, prompts, tokens.
# Runner expands the Cartesian product (unless mode overrides expansion).

defaults:
  n_ctx: 512
  sync_timeout_s: 1800
  sync_max_rounds: 8
  reset_before_run: true
  warmup_tokens: 4
  base_prompt: "The capital of France is"
  wait_cluster_timeout_s: 120

profiles:
  # Full matrix (local / nightly)
  default:
    models:
      - tinyllama
    cluster_sizes:
      - 3
    prompt_lengths:
      - 16
      - 128
      - 512
    generate_tokens:
      - 32
      - 128

  # CI: TinyLlama + Llama 3.2 + Qwen 2.5 on 3-node cluster
  ci:
    models:
      - tinyllama
      - llama3_1b
      - qwen2_1_5b
    cluster_sizes:
      - 3
    prompt_lengths:
      - 16
    generate_tokens:
      - 16
    reset_before_run: true
    warmup_tokens: 0

  # Scaling study — run with 2/3/4/5 nodes online; tags each run by observed size
  scaling:
    mode: scaling
    models:
      - tinyllama
    cluster_sizes:
      - 2
      - 3
      - 4
      - 5
    prompt_lengths:
      - 128
    generate_tokens:
      - 64

  # Large models — stops after layout when fits_cluster=false
  large:
    mode: large
    models:
      - qwen8b
      - qwen14b
      - qwen30b
      - gemma27b
    cluster_sizes:
      - 3
    prompt_lengths:
      - 16
    generate_tokens:
      - 32
    stop_if_not_fits: true

  # Stress — repeated generate (reduce requests in CI via env BENCHMARK_STRESS_REQUESTS)
  stress:
    mode: stress
    models:
      - tinyllama
    cluster_sizes:
      - 3
    prompt_lengths:
      - 16
    generate_tokens:
      - 32
    stress_requests: 1000
    stress_warmup: 5

  # Fault injection — shutdown one node mid-sync or mid-generate
  fault:
    mode: fault
    models:
      - tinyllama
    cluster_sizes:
      - 3
    prompt_lengths:
      - 16
    generate_tokens:
      - 32
    fault_node: node-c
    fault_stage: synchronization

  # Task 11 — all architecture families on 3-node Docker; max Qwen3-8B
  task11_docker:
    mode: task11
    models:
      - tinyllama
      - llama3_1b
      - qwen2_1_5b
      - gemma3_1b
      - phi3_5
      - smollm2_1_7b
      - deepseek_qwen_1_5b
      - qwen8b
    cluster_sizes:
      - 3
    prompt_lengths:
      - 16
    generate_tokens:
      - 32
    reset_before_run: true
    warmup_tokens: 4
    sync_timeout_s: 3600
    sync_max_rounds: 12
    wait_cluster_timeout_s: 180
    release_workers_between_models: true
    release_workers_before_run: true
    purge_model_after_scenario: true
    restart_docker_nodes_between_models: true
    inter_scenario_cooldown_s: 15
    stop_if_not_fits: true

  # Task 12 — perf trace verification on 3-node Docker (single model, fast)
  task12_docker:
    mode: task12
    models:
      - tinyllama
    cluster_sizes:
      - 3
    prompt_lengths:
      - 16
    generate_tokens:
      - 8
    reset_before_run: true
    warmup_tokens: 2
    sync_timeout_s: 1800
    sync_max_rounds: 8
    wait_cluster_timeout_s: 120
    session_create_timeout_s: 600
    release_workers_between_models: false
    release_workers_before_run: true
    purge_model_after_scenario: false
    restart_docker_nodes_between_models: false
    inter_scenario_cooldown_s: 5
    stop_if_not_fits: true
    perf_trace: true

  # Homelab LAN — full catalog on physical 3-node cluster
  homelab_full:
    mode: homelab
    models:
      - tinyllama
      - llama3_1b
      - qwen2_1_5b
      - gemma3_1b
      - phi3_5
      - smollm2_1_7b
      - deepseek_qwen_1_5b
      - qwen8b
      - qwen14b
      - qwen30b
      - gemma27b
    cluster_sizes:
      - 3
    prompt_lengths:
      - 16
    generate_tokens:
      - 32
    reset_before_run: true
    warmup_tokens: 4
    sync_timeout_s: 7200
    sync_max_rounds: 12
    wait_cluster_timeout_s: 180
    session_create_timeout_s: 1200
    release_workers_between_models: true
    release_workers_before_run: true
    purge_model_after_scenario: true
    restart_docker_nodes_between_models: false
    inter_scenario_cooldown_s: 15
    stop_if_not_fits: true
    perf_trace: true

  # Task 12 runtime profile — homelab subset with full trace phases
  runtime_profile:
    mode: homelab
    models:
      - tinyllama
      - smollm2_1_7b
      - qwen8b
    cluster_sizes:
      - 3
    prompt_lengths:
      - 16
    generate_tokens:
      - 32
    reset_before_run: true
    warmup_tokens: 4
    sync_timeout_s: 7200
    sync_max_rounds: 12
    wait_cluster_timeout_s: 180
    session_create_timeout_s: 1200
    release_workers_between_models: true
    release_workers_before_run: true
    purge_model_after_scenario: true
    inter_scenario_cooldown_s: 15
    stop_if_not_fits: true
    perf_trace: true
